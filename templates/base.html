<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tool Sharing{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f4ff', 100:'#dbe4ff', 200:'#bac8ff', 300:'#91a7ff', 400:'#748ffc', 500:'#5c7cfa', 600:'#4c6ef5', 700:'#4263eb', 800:'#3b5bdb', 900:'#364fc7' }
          }
        }
      }
    }
    </script>
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .nav-link { position: relative; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -12px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #748ffc, #5c7cfa); border-radius: 1px; }
        .card { background: rgba(30, 32, 40, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; transition: border-color 0.2s; }
        .card:hover { border-color: rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #4c6ef5, #5c7cfa); transition: all 0.2s; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(76,110,245,0.3); }
        .input-field { background: rgba(20, 22, 28, 0.8); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: #e4e4e7; transition: border-color 0.2s; }
        .input-field:focus { outline: none; border-color: #5c7cfa; box-shadow: 0 0 0 3px rgba(92,124,250,0.15); }
        .input-field::placeholder { color: #52525b; }
        .stat-card { background: linear-gradient(135deg, rgba(30,32,40,0.9), rgba(35,37,48,0.7)); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0e0f14] text-gray-200 min-h-screen">
    {% block nav %}
    <nav class="sticky top-0 z-50 bg-[#0e0f14]/80 backdrop-blur-xl border-b border-white/[0.04]">
        <div class="max-w-5xl mx-auto px-5 h-14 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"/></svg>
                </div>
                <span class="text-[15px] font-semibold text-white">Tool Sharing</span>
            </a>
            <div class="flex items-center gap-1">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active text-white{% else %}text-gray-500 hover:text-gray-300{% endif %} px-3 py-1.5 rounded-lg text-[13px] font-medium transition">
                    Dashboard
                </a>
                <a href="/friends" class="nav-link {% if '/friends' in request.url.path %}active text-white{% else %}text-gray-500 hover:text-gray-300{% endif %} px-3 py-1.5 rounded-lg text-[13px] font-medium transition">
                    Friends
                </a>
                <a href="/tools" class="nav-link {% if request.url.path == '/tools' %}active text-white{% else %}text-gray-500 hover:text-gray-300{% endif %} px-3 py-1.5 rounded-lg text-[13px] font-medium transition">
                    Tools
                </a>
            </div>
        </div>
    </nav>
    {% endblock %}
    <main class="max-w-5xl mx-auto px-5 py-8 fade-in">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
